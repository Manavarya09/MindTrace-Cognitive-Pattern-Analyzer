# MindTrace Configuration

[analysis]
n_samples = 1000
variability = high

[preprocessing]
remove_stopwords = true
lemmatize = true
extract_entities = true
min_word_length = 3

[nlp]
sentiment_method = ensemble
emotion_detection = lexicon
confidence_threshold = 0.5

[clustering]
n_clusters = 4
clustering_method = kmeans
reduce_dimensions = tsne

[visualization]
template = plotly_white
height = 400
width = 800

[output]
save_results = false
export_format = json
